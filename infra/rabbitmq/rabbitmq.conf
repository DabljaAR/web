# RabbitMQ 3.12+ closes consumers that hold an unacked delivery longer than
# consumer_timeout (default 30 minutes). CPU TTS dubbing can run for hours.
# rabbitmq.conf requires a positive integer (ms); 0/false are rejected at boot.
# 43200000 ms = 12 hours (RabbitMQ-recommended alternative to disabling).
consumer_timeout = 43200000
