global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets: ["localhost:8428"]

  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:8081"]
    metrics_path: /metrics

  - job_name: stt
    static_configs:
      - targets: ["stt-service:8001"]
    metrics_path: /metrics

  - job_name: nmt
    static_configs:
      - targets: ["nmt-service:8002"]
    metrics_path: /metrics

  - job_name: tts
    static_configs:
      - targets: ["tts-service:8005"]
    metrics_path: /metrics

  - job_name: media
    static_configs:
      - targets: ["media-service:8003"]
    metrics_path: /metrics
