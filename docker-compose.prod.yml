services:
  caddy:
    image: caddy:2.10-alpine
    container_name: dabljaar_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "127.0.0.1:2019:2019"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required for production}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required for production}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    networks:
      - dabljaar_network

  postgres:
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-dabljaar}

  redis:
    ports: []

  minio:
    image: minio/minio:latest
    ports: []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports: []
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    environment:
      INSTALL_AI: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dabljaar}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dablaja-videos}
      MINIO_SECURE: "false"
      ENVIRONMENT: production
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    profiles: ["dev"]

  celery-worker-media:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes: []
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dabljaar}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dablaja-videos}
      MINIO_SECURE: "false"
      ENVIRONMENT: production
      DEBUG: "false"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  celery-worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        INSTALL_AI: "true"
    volumes: []
    environment:
      INSTALL_AI: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dabljaar}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-dablaja-videos}
      MINIO_SECURE: "false"
      ENVIRONMENT: production
      DEBUG: "false"
      STT_DEVICE: ${STT_DEVICE:-cpu}
      HABIBI_DEVICE: ${HABIBI_DEVICE:-cpu}
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  flower:
    profiles: ["admin"]
    ports: []

volumes:
  caddy_data:
  caddy_config:
