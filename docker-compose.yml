services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dabljaar_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dabljaar
    ports:
      - "5433:5432"
    volumes:
      - dabljaar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dabljaar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # Redis (Celery broker & result backend)
  redis:
    image: redis:7-alpine
    container_name: dabljaar_redis
    ports:
      - "6379:6379"
    volumes:
      - dabljaar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: dabljaar_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dabljaar_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_AI: "true"
    container_name: dabljaar_backend
    environment:
      INSTALL_AI: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Media Microservice (FastAPI)
  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: dabljaar_media_service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dabljaar_network

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    container_name: dabljaar_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dabljaar_network

  # Celery worker — media queue (video processing, HLS transcode)
  celery-worker-media:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dabljaar_worker_media
    entrypoint: []
    command: celery -A app.jobs.celery_app worker --loglevel=info -Q media --concurrency=${MEDIA_WORKER_CONCURRENCY:-2} --hostname=worker-media@%h
    environment:
      MEDIA_WORKER_CONCURRENCY: ${MEDIA_WORKER_CONCURRENCY:-2}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      MEDIA_SERVICE_URL: http://media-service:8001
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      media-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # Celery worker — AI queues (STT, NMT, TTS, pipeline)
  # STT: populate MinIO bucket S3_MODELS_BUCKET (default: model) under STT_MODEL_KEY (e.g. whisper-small/)
  # with CTranslate2 files (model.bin, config.json, …) to avoid Hugging Face on cold start.
  # Optional env (not set by default): HF_HOME=/model-cache/hf HF_HUB_DISABLE_XET=1 HF_HUB_ENABLE_HF_TRANSFER=1
  celery-worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_AI: "true"
    container_name: dabljaar_worker_ai
    entrypoint: []
    command: celery -A app.jobs.celery_app worker --pool=solo --loglevel=info -Q ai_stt,pipeline,ai_nmt,ai_tts --concurrency=${AI_WORKER_CONCURRENCY:-1} --hostname=worker-ai@%h
    environment:
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-1}
      INSTALL_AI: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      NMT_MODEL_LOCAL_PATH: /model-cache/nmt-v4
      NMT_MODEL_KEY: ${NMT_MODEL_KEY:-nmt-v4}
      NMT_HF_FALLBACK: ${NMT_HF_FALLBACK:-facebook/nllb-200-distilled-600M}
      NMT_FALLBACK_MODE: ${NMT_FALLBACK_MODE:-stage2_only}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      NMT_LENGTH_ADJUST_ENABLED: ${NMT_LENGTH_ADJUST_ENABLED:-true}
      NMT_LENGTH_ADJUST_SCALE: ${NMT_LENGTH_ADJUST_SCALE:-0.9}
      NMT_LENGTH_ADJUST_MAX_ITERS: ${NMT_LENGTH_ADJUST_MAX_ITERS:-5}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: ${HF_HOME:-/model-cache/hf}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE:-/model-cache/hf/hub}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/model-cache/hf/transformers}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/model-cache/xdg-cache}
      TORCH_HOME: ${TORCH_HOME:-/model-cache/torch}
      CATT_TASHKEEL_MODEL_DIR: ${CATT_TASHKEEL_MODEL_DIR:-/model-cache/catt_tashkeel/onnx_models}
      STT_MODEL_SIZE: ${STT_MODEL_SIZE:-small}
      STT_MODEL_KEY: ${STT_MODEL_KEY:-whisper-small}
      STT_MODEL_LOCAL_PATH: ${STT_MODEL_LOCAL_PATH:-/model-cache/whisper-small}
      MEDIA_SERVICE_URL: http://media-service:8001
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - nmt_model_cache:/model-cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      media-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # Flower — Celery monitoring UI
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dabljaar_flower
    entrypoint: []
    command: celery -A app.jobs.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Milliseconds; default 1000 is too low when workers are still booting (especially celery-worker-ai).
      FLOWER_INSPECT_TIMEOUT: ${FLOWER_INSPECT_TIMEOUT:-15000}
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker-media:
        condition: service_started
      celery-worker-ai:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

volumes:
  dabljaar_postgres_data:
  dabljaar_redis_data:
  dabljaar_minio_data:
  nmt_model_cache:

networks:
  dabljaar_network:
    driver: bridge
