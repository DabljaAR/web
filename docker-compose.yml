services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dabljaar_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dabljaar
    ports:
      - "5433:5432"
    volumes:
      - dabljaar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dabljaar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # ─── RabbitMQ (Event Broker) ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dabljaar_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dabljaar_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dabljaar_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dabljaar_network

  # ─── STT Microservice (Speech-to-Text via Faster-Whisper) ─────────────────
  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./libs/dablja-worker
        docker_torch: ./libs/docker-torch
    container_name: dabljaar_stt_service
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/dabljaar"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STT_MODEL_SIZE: ${STT_MODEL_SIZE:-small}
      STT_MODEL_KEY: ${STT_MODEL_KEY:-whisper-small}
      STT_MODEL_LOCAL_PATH: ${STT_MODEL_LOCAL_PATH:-/model-cache/whisper-small}
      HF_HOME: ${HF_HOME:-/model-cache/hf}
      HF_HUB_CACHE: ${HF_HUB_CACHE:-/model-cache/hf/hub}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/model-cache/hf/transformers}
      STT_DEVICE: ${STT_DEVICE:-auto}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-auto}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      STT_ALLOW_HF_FALLBACK: ${STT_ALLOW_HF_FALLBACK:-true}
      PREWARM_STT_MODEL: ${PREWARM_STT_MODEL:-true}
      PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ai_model_cache:/model-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # ─── NMT Microservice (Neural Machine Translation) ────────────────────────
  nmt-service:
    build:
      context: ./nmt-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./libs/dablja-worker
        docker_torch: ./libs/docker-torch
    container_name: dabljaar_nmt_service
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/dabljaar"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      NMT_MODEL_LOCAL_PATH: ${NMT_MODEL_LOCAL_PATH:-/model-cache/nmt-v4}
      NMT_MODEL_KEY: ${NMT_MODEL_KEY:-nmt-v4}
      NMT_FALLBACK_MODE: ${NMT_FALLBACK_MODE:-stage2_only}
      NMT_LENGTH_ADJUST_ENABLED: ${NMT_LENGTH_ADJUST_ENABLED:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      NMT_ALLOW_HF_FALLBACK: ${NMT_ALLOW_HF_FALLBACK:-true}
      PREWARM_NMT_MODEL: ${PREWARM_NMT_MODEL:-true}
      PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ai_model_cache:/model-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # ─── TTS Microservice (SILMA-TTS synthesis) ───────────────────────────────
  tts-service:
    build:
      context: ./tts-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./libs/dablja-worker
        docker_torch: ./libs/docker-torch
        docker_onnx: ./libs/docker-onnx
    container_name: dabljaar_tts_service
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/dabljaar"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      HF_HOME: ${HF_HOME:-/model-cache/hf}
      HF_TOKEN: ${HF_TOKEN:-}
      SILMA_DEVICE: ${SILMA_DEVICE:-auto}
      TTS_DEFAULT_NFE_STEP: ${TTS_DEFAULT_NFE_STEP:-32}
      CATT_TASHKEEL_MODEL_DIR: ${CATT_TASHKEEL_MODEL_DIR:-/model-cache/catt_tashkeel/onnx_models}
      PREWARM_TTS_MODEL: ${PREWARM_TTS_MODEL:-true}
      PORT: 8005
    ports:
      - "8005:8005"
    volumes:
      - ai_model_cache:/model-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # ─── Media Microservice (dubbing merge stage only) ────────────────────────
  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./libs/dablja-worker
    container_name: dabljaar_media_service
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/dabljaar"
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      MERGE_TEMP_DIR: /tmp/dubbing_merge
      LOG_LEVEL: INFO
      PORT: 8003
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - dabljaar_network

  # ─── Go Orchestrator ──────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: dabljaar_orchestrator
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/dabljaar?sslmode=disable"
      HEALTH_PORT: "8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dabljaar_network

  # ─── Backend API (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_AI: "false"
    container_name: dabljaar_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      STT_SERVICE_URL: "http://stt-service:8001"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_MEDIA_BUCKET: ${S3_MEDIA_BUCKET:-dablaja-videos}
      S3_MODELS_BUCKET: ${S3_MODELS_BUCKET:-model}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dabljaar_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Frontend (React/Vite) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: dabljaar_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api}
    networks:
      - dabljaar_network

volumes:
  dabljaar_postgres_data:
  dabljaar_minio_data:
  ai_model_cache:

networks:
  dabljaar_network:
    driver: bridge
