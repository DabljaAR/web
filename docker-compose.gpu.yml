# docker-compose.gpu.yml
# GPU overlay — builds the AI worker with Pascal-compatible PyTorch (sm_61+).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Requires: NVIDIA Container Toolkit on the host.
services:
  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile.gpu
      additional_contexts:
        shared: ./libs/dablja-worker
    gpus: all

  tts-service:
    build:
      context: ./tts-service
      dockerfile: Dockerfile.gpu
      additional_contexts:
        shared: ./libs/dablja-worker
    environment:
      SILMA_DEVICE: cuda
      PREWARM_TTS_MODEL: "true"
    gpus: all
