# docker-compose.gpu.yml
# GPU overlay — builds the AI worker with Pascal-compatible PyTorch (sm_61+).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Requires: NVIDIA Container Toolkit on the host.

services:

  # ── Media service — NVDEC-accelerated FFmpeg (hardware decode) ───────────────
  media-service:
    environment:
      USE_GPU_FFMPEG: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── AI worker — GPU inference (TTS, Celery tasks) ────────────────────────────
  celery-worker-ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    gpus: all
    environment:
      STT_DEVICE: cuda
      SILMA_DEVICE: cuda
      STT_COMPUTE_TYPE: int8_float32

  # ── STT service — GPU-accelerated Whisper inference ──────────────────────────
  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile.gpu
    gpus: all
