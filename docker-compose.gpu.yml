# GPU overlay — GTX 1080 Ti (Pascal, compute 6.1, CUDA 12.x)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build media-service
#
# Prerequisites:
#   - NVIDIA driver >= 525 on the host
#   - nvidia-container-toolkit  (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
#   - sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker

services:

  # ── Media service — NVDEC-accelerated FFmpeg (hardware decode) ───────────────
  # Uses the standard Dockerfile (python:3.12-slim + ffmpeg).
  # NVIDIA driver libs are injected at container start by the CDI spec (/etc/cdi/nvidia.yaml).
  # Dockerfile.gpu (nvidia/cuda:12.3.2 base, 1.3 GB) is kept for reference but not needed.
  media-service:
    environment:
      USE_GPU_FFMPEG: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── AI worker — GPU inference (Whisper STT, NMT, TTS) ───────────────────────
  celery-worker-ai:
    environment:
      STT_DEVICE: cuda
      SILMA_DEVICE: cuda
      STT_COMPUTE_TYPE: float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
