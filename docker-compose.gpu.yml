# docker-compose.gpu.yml
# GPU overlay: enables NVIDIA GPU passthrough for the AI worker (STT/TTS).
# Usage: docker compose -f docker-compose.yml [-f docker-compose.prod.yml] -f docker-compose.gpu.yml up -d
# Requires: NVIDIA Container Toolkit installed on the host (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html).
services:
  celery-worker-ai:
    gpus: all
    environment:
      STT_DEVICE: cuda
      SILMA_DEVICE: cuda
      STT_COMPUTE_TYPE: float16
