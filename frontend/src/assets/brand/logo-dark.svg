<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="DabljaAR — AI Video Dubbing Platform (dark background variant)">
  <!--
    DabljaAR Logo — Dark Background Variant
    Use on dark/navy backgrounds. Wordmark is white; AR accent in amber.
  -->
  <defs>
    <linearGradient id="iconGradDark" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect x="8" y="8" width="64" height="64" rx="14" fill="url(#iconGradDark)"/>

  <!-- Waveform bars -->
  <rect x="20" y="28" width="5" height="24" rx="2.5" fill="white" opacity="0.65"/>
  <rect x="29" y="22" width="5" height="36" rx="2.5" fill="white" opacity="0.80"/>
  <rect x="38" y="16" width="5" height="48" rx="2.5" fill="white" opacity="1.00"/>
  <rect x="47" y="22" width="5" height="36" rx="2.5" fill="white" opacity="0.80"/>
  <rect x="56" y="28" width="5" height="24" rx="2.5" fill="white" opacity="0.65"/>

  <!-- Amber accent dot -->
  <circle cx="62" cy="62" r="5" fill="#F59E0B"/>

  <!-- Wordmark — white on dark -->
  <text
    x="88" y="46"
    font-family="Cairo, system-ui, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="-0.5"
  >
    <tspan fill="#FFFFFF">Dablja</tspan><tspan fill="#F59E0B">AR</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="89" y="63"
    font-family="Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="10"
    fill="#A5B4FC"
    letter-spacing="2.5"
  >AI VIDEO DUBBING</text>
</svg>
