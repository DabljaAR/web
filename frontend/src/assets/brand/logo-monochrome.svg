<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="DabljaAR — monochrome variant">
  <!--
    DabljaAR Logo — Monochrome (single-color) Variant
    Use when only one ink color is available (print, stamps, embossing).
    Default color: #1E1B4B (Navy). Override fill on the root element as needed.
  -->

  <!-- Icon mark (filled, single color) -->
  <rect x="8" y="8" width="64" height="64" rx="14" fill="#1E1B4B"/>

  <!-- Waveform bars in white -->
  <rect x="20" y="28" width="5" height="24" rx="2.5" fill="white" opacity="0.65"/>
  <rect x="29" y="22" width="5" height="36" rx="2.5" fill="white" opacity="0.80"/>
  <rect x="38" y="16" width="5" height="48" rx="2.5" fill="white"/>
  <rect x="47" y="22" width="5" height="36" rx="2.5" fill="white" opacity="0.80"/>
  <rect x="56" y="28" width="5" height="24" rx="2.5" fill="white" opacity="0.65"/>

  <!-- Accent dot (monochrome — same as main color, outlined) -->
  <circle cx="62" cy="62" r="5" fill="white"/>

  <!-- Wordmark — single color -->
  <text
    x="88" y="46"
    font-family="Cairo, system-ui, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="-0.5"
    fill="#1E1B4B"
  >DabljaAR</text>

  <!-- Tagline -->
  <text
    x="89" y="63"
    font-family="Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="10"
    fill="#4338CA"
    letter-spacing="2.5"
  >AI VIDEO DUBBING</text>
</svg>
