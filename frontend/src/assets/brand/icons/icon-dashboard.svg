<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-label="Dashboard">
  <!-- 2×2 grid of rounded tiles -->
  <!-- Top-left -->
  <rect x="3"  y="3"  width="7" height="7" rx="1.5"/>
  <!-- Top-right -->
  <rect x="14" y="3"  width="7" height="7" rx="1.5"/>
  <!-- Bottom-left -->
  <rect x="3"  y="14" width="7" height="7" rx="1.5"/>
  <!-- Bottom-right (wider to suggest metrics/stats) -->
  <rect x="14" y="14" width="7" height="7" rx="1.5"/>
</svg>
