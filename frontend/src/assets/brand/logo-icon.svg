<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DabljaAR icon">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#iconGrad)"/>

  <!-- Audio waveform bars — arch silhouette, centered at y=32 -->
  <!-- Bar 1 -->
  <rect x="12" y="20" width="5" height="24" rx="2.5" fill="white" opacity="0.70"/>
  <!-- Bar 2 -->
  <rect x="21" y="14" width="5" height="36" rx="2.5" fill="white" opacity="0.85"/>
  <!-- Bar 3 — tallest, center anchor -->
  <rect x="30" y="8"  width="5" height="48" rx="2.5" fill="white" opacity="1.00"/>
  <!-- Bar 4 -->
  <rect x="39" y="14" width="5" height="36" rx="2.5" fill="white" opacity="0.85"/>
  <!-- Bar 5 -->
  <rect x="48" y="20" width="5" height="24" rx="2.5" fill="white" opacity="0.70"/>

  <!-- Amber accent dot — bottom-right corner, signals AR identity -->
  <circle cx="54" cy="54" r="5" fill="#D97706"/>
</svg>
