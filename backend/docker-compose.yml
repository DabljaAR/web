# backend/docker-compose.yml
# Backend-only compose for isolated backend development (without the React frontend).
# Starts: postgres, redis, minio, backend API, celery-worker-media, celery-worker-ai.
# Usage (from repo root): docker compose -f backend/docker-compose.yml up -d
# For full-stack development use the root docker-compose.yml instead.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dabljaar_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dabljaar
    ports:
      - "5433:5432"
    volumes:
      - dabljaar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dabljaar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dabljaar_redis
    ports:
      - "6379:6379"
    volumes:
      - dabljaar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dabljaar_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dabljaar_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dabljaar_app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  celery-worker-media:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dabljaar_worker_media
    entrypoint: []
    command: celery -A app.jobs.celery_app worker --loglevel=info -Q media --concurrency=2 --hostname=worker-media@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  celery-worker-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_AI: "true"
    container_name: dabljaar_worker_ai
    entrypoint: []
    command: celery -A app.jobs.celery_app worker --loglevel=info -Q ai_stt,pipeline,ai_nmt,ai_tts --concurrency=1 --hostname=worker-ai@%h
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dabljaar
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: dablaja-videos
      MINIO_SECURE: "false"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

volumes:
  dabljaar_postgres_data:
  dabljaar_redis_data:
  dabljaar_minio_data:
