name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HADOLINT_IMAGE: ghcr.io/hadolint/hadolint:v2.12.0
  GITLEAKS_IMAGE: ghcr.io/gitleaks/gitleaks:v8.18.2
  TRIVY_DB_CACHE_DIR: /root/.cache/trivy

jobs:
  gitleaks-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Run gitleaks (PR diff scan)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ${{ env.GITLEAKS_IMAGE }} \
            detect \
            --config /src/.gitleaks.toml \
            --log-opts="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            --report-format sarif \
            --report-path /src/gitleaks-report.sarif \
            --redact \
            --verbose

      - name: Run gitleaks (full scan)
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ${{ env.GITLEAKS_IMAGE }} \
            detect \
            --config /src/.gitleaks.toml \
            --source /src \
            --report-format sarif \
            --report-path /src/gitleaks-report.sarif \
            --redact \
            --verbose

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 7

  hadolint-lint:
    name: hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hadolint on all Dockerfiles
        run: |
          # Initialize empty SARIF so merge always has input
          echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0-rtm.5.json","runs":[]}' \
            > /tmp/hadolint-report.json

          while IFS= read -r -d '' df; do
            echo "Linting: $df"
            if echo "$df" | grep -qE 'Dockerfile\.gpu'; then
              config=".hadolint-gpu.yaml"
            else
              config=".hadolint.yaml"
            fi
            [ -f "$config" ] || config=".hadolint.yaml"
            docker run --rm \
              -v "${{ github.workspace }}:/src" \
              -w /src \
              ${{ env.HADOLINT_IMAGE }} \
              hadolint \
              --config "/src/$config" \
              --failure-threshold error \
              --format sarif \
              "/src/$df" 2>/dev/null > /tmp/hadolint-partial.json || true
            if [ -s /tmp/hadolint-partial.json ]; then
              jq -s '.[0].runs = [.[] | .runs[]] | .[0]' \
                /tmp/hadolint-report.json /tmp/hadolint-partial.json \
                > /tmp/hadolint-merged.json 2>/dev/null && \
                mv /tmp/hadolint-merged.json /tmp/hadolint-report.json
            fi
          done < <(find . -name 'Dockerfile*' -type f -not -path './.git/*' -print0)

          cp /tmp/hadolint-report.json "${{ github.workspace }}/hadolint-report.sarif"

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-report.sarif
          category: hadolint

  trivy-fs:
    name: trivy-filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pass 1: full severity range for SARIF report (non-blocking)
      - name: Trivy FS scan (all severities — SARIF output)
        uses: aquasecurity/trivy-action@0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-report.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"
          cache: true
          trivy-config: .trivyignore

      # Pass 2: CRITICAL/HIGH only for blocking (no SARIF, just exit code)
      - name: Trivy FS scan (CRITICAL/HIGH — blocking)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          cache: true
          trivy-config: .trivyignore

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-report.sarif
          category: trivy-fs

  trivy-config:
    name: trivy-config
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-report.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          cache: true

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config-report.sarif
          category: trivy-config

  trivy-image:
    name: trivy-image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - "backend/Dockerfile*"
              - "frontend/Dockerfile*"
              - "orchestrator/Dockerfile*"
              - "nmt-service/Dockerfile*"
              - "media-service/Dockerfile*"
              - "backend/requirements*"
              - "frontend/package-lock.json"
              - "orchestrator/go.sum"
              - "nmt-service/requirements*"
              - "media-service/requirements*"
              - "backend/uv.lock"
              - "backend/pyproject.toml"
              - "libs/**"
              - ".github/workflows/security-scan.yml"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Trivy DB
        id: cache-trivy-db
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_DB_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}

      - name: Build and scan images
        if: steps.filter.outputs.image == 'true' || github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          images=()
          for dir in backend frontend orchestrator nmt-service media-service; do
            df="$dir/Dockerfile"
            [ -f "$df" ] || continue
            tag="dabljaar/$dir:ci-scan"
            echo "Building $tag from $df"
            docker buildx build -t "$tag" -f "$df" "$dir" --load
            images+=("$tag")
          done

          if [ ${#images[@]} -eq 0 ]; then
            echo "No images to scan — skipping"
            exit 0
          fi

          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format sarif \
            --output trivy-image-report.sarif \
            --cache-dir "${{ env.TRIVY_DB_CACHE_DIR }}" \
            "${images[@]}"

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-report.sarif
          category: trivy-image

      - name: Upload image scan artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.sarif
          retention-days: 14
