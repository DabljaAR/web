name: Deploy to GCP VM

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Deployment reason (optional)"
        required: false
        type: string
  push:
    branches: [production]
    paths:
      - backend/**
      - frontend/**
      - docker-compose.yaml
      - docker-compose.prod.yml
      - Caddyfile
      - Dockerfile.caddy
      - .github/workflows/deploy-gcp.yml

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-gcp
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      TARGET_BRANCH: production
      APP_DIR: /opt/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_PORT: ${{ secrets.GCP_VM_PORT }}
          VM_SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$VM_HOST" ] || [ -z "$VM_USER" ] || [ -z "$VM_SSH_KEY" ]; then
            echo "Missing required secrets: GCP_VM_HOST, GCP_VM_USER, GCP_VM_SSH_KEY"
            exit 1
          fi

          VM_PORT="${VM_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_PORT: ${{ secrets.GCP_VM_PORT }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          APP_DIR: ${{ env.APP_DIR }}
          REPO_SSH_URL: ${{ secrets.GIT_REPO_SSH_URL }}
          REPO_FALLBACK: git@github.com:${{ github.repository }}.git
        run: |
          set -euo pipefail
          VM_PORT="${VM_PORT:-22}"

          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" \
            "TARGET_BRANCH='$TARGET_BRANCH' APP_DIR='$APP_DIR' REPO_SSH_URL='$REPO_SSH_URL' REPO_FALLBACK='$REPO_FALLBACK' bash -se" <<'EOF'
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            echo "git is not installed on VM"
            exit 1
          fi

          REPO_URL="${REPO_SSH_URL:-$REPO_FALLBACK}"

          # Bootstrap repository on first deploy if it does not exist yet.
          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR"
            git clone -b "$TARGET_BRANCH" "$REPO_URL" "$APP_DIR" || {
              echo "Failed to clone repository. Ensure VM has GitHub SSH access for private repo."
              echo "Tried URL: $REPO_URL"
              exit 1
            }
          fi

          cd "$APP_DIR"

          git fetch --prune origin
          git checkout "$TARGET_BRANCH"
          git pull --ff-only origin "$TARGET_BRANCH"

          COMPOSE_CMD="docker compose"
          if ! docker compose version >/dev/null 2>&1; then
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither docker compose nor docker-compose is available on VM"
              exit 1
            fi
          fi

          $COMPOSE_CMD --env-file .env.production -f docker-compose.yaml -f docker-compose.prod.yml up -d --build
          $COMPOSE_CMD --env-file .env.production -f docker-compose.yaml -f docker-compose.prod.yml ps

          curl -fsS http://localhost:8000/api/health >/dev/null
          git rev-parse --short HEAD
          EOF

      - name: Deployment summary
        run: |
          {
            echo "## Production Deployment"
            echo "- Workflow: deploy-gcp"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Repository SHA: ${{ github.sha }}"
            echo "- Target branch: ${{ env.TARGET_BRANCH }}"
            echo "- Target VM path: ${{ env.APP_DIR }}"
            echo "- Compose profile: docker-compose.yaml + docker-compose.prod.yml"
          } >> "$GITHUB_STEP_SUMMARY"
