name: Deploy to GCP VM

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Deployment reason (optional)"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - orchestrator/**
      - stt-service/**
      - nmt-service/**
      - tts-service/**
      - media-service/**
      - libs/dablja-worker/**
      - libs/docker-torch/**
      - docker-compose.microservices.prod.yml
      - docker-compose.observability.yml
      - infra/observability/**
      - infra/rabbitmq/enabled_plugins
      - infra/scripts/deploy-production.sh
      - infra/scripts/lib/**
      - Caddyfile.minimal
      - .github/workflows/deploy-gcp.yml

permissions:
  contents: read

concurrency:
  group: production-deploy
  # Never cancel an in-progress deployment — a cancelled deploy mid-run can
  # leave the VM in a partial state (some containers on new images, others not,
  # migrations half-applied). Subsequent runs queue instead of clobbering.
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy-gcp
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production
    env:
      TARGET_BRANCH: main
      APP_DIR: ~/web
      ENV_FILE: .env.production
      BOOTSTRAP_MARKER: /var/lib/vm-bootstrap.done
      REQUIRE_BOOTSTRAP_MARKER: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_PORT: ${{ secrets.GCP_VM_PORT }}
          VM_SSH_KEY: ${{ secrets.GCP_VM_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$VM_HOST" ] || [ -z "$VM_USER" ] || [ -z "$VM_SSH_KEY" ]; then
            echo "Missing required secrets: GCP_VM_HOST, GCP_VM_USER, GCP_VM_SSH_KEY"
            exit 1
          fi

          VM_PORT="${VM_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_PORT: ${{ secrets.GCP_VM_PORT }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          APP_DIR: ${{ env.APP_DIR }}
          ENV_FILE: ${{ env.ENV_FILE }}
          BOOTSTRAP_MARKER: ${{ env.BOOTSTRAP_MARKER }}
          REQUIRE_BOOTSTRAP_MARKER: ${{ env.REQUIRE_BOOTSTRAP_MARKER }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REASON: ${{ github.event.inputs.reason || github.event.head_commit.message || 'push' }}
          REPO_SSH_URL: ${{ secrets.GIT_REPO_SSH_URL }}
          REPO_FALLBACK: git@github.com:${{ github.repository }}.git
        run: |
          set -euo pipefail
          VM_PORT="${VM_PORT:-22}"

          # Shell-quote all values before embedding them in the remote heredoc so
          # that special characters in commit messages / paths don't break the script.
          _q_target_branch=$(printf '%q' "$TARGET_BRANCH")
          _q_app_dir=$(printf '%q' "$APP_DIR")
          _q_env_file=$(printf '%q' "$ENV_FILE")
          _q_bootstrap_marker=$(printf '%q' "$BOOTSTRAP_MARKER")
          _q_require_bootstrap=$(printf '%q' "$REQUIRE_BOOTSTRAP_MARKER")
          _q_deploy_sha=$(printf '%q' "$DEPLOY_SHA")
          _q_deploy_reason=$(printf '%q' "$DEPLOY_REASON")
          _q_repo_ssh_url=$(printf '%q' "$REPO_SSH_URL")
          _q_repo_fallback=$(printf '%q' "$REPO_FALLBACK")

          # The heredoc only sets environment variables and delegates ALL git
          # operations and deployment logic to deploy-production.sh. Do NOT
          # duplicate git fetch/checkout here — the script owns git sync.
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" bash -se <<REMOTE_EOF
          set -euo pipefail
          export TARGET_BRANCH=${_q_target_branch}
          export APP_DIR=${_q_app_dir}
          export ENV_FILE=${_q_env_file}
          export BOOTSTRAP_MARKER=${_q_bootstrap_marker}
          export REQUIRE_BOOTSTRAP_MARKER=${_q_require_bootstrap}
          export DEPLOY_SHA=${_q_deploy_sha}
          export DEPLOY_REASON=${_q_deploy_reason}
          export REPO_SSH_URL=${_q_repo_ssh_url}
          export REPO_FALLBACK=${_q_repo_fallback}

          # Expand tilde so the script receives an absolute path.
          case "\$APP_DIR" in
            "~"|"~/"*) APP_DIR="\${HOME}\${APP_DIR#\\~}" ;;
          esac
          export APP_DIR

          mkdir -p "\$APP_DIR"

          # Bootstrap: clone repo if the directory has no .git yet.
          # All subsequent git operations (fetch/checkout/reset) are handled
          # inside deploy-production.sh via sync_repository().
          if [ ! -d "\$APP_DIR/.git" ]; then
            REPO_URL="\${REPO_SSH_URL:-\$REPO_FALLBACK}"
            if [ -n "\$(ls -A "\$APP_DIR" 2>/dev/null || true)" ] && [ "\${DEPLOY_FORCE_CLONE:-false}" != "true" ]; then
              echo "APP_DIR exists without .git and is non-empty: \$APP_DIR"
              echo "Set DEPLOY_FORCE_CLONE=true to re-clone, or remove the directory manually."
              exit 1
            fi
            git clone -b "\$TARGET_BRANCH" "\$REPO_URL" "\$APP_DIR" || {
              echo "Failed to clone repository. Ensure VM has GitHub SSH access for private repo."
              echo "Tried URL: \$REPO_URL"
              exit 1
            }
          fi

          cd "\$APP_DIR"
          exec bash infra/scripts/deploy-production.sh
          REMOTE_EOF

      - name: Deployment summary
        if: always()
        env:
          DEPLOY_STATUS: ${{ job.status }}
        run: |
          {
            if [ "$DEPLOY_STATUS" = "success" ]; then
              echo "## ✅ Production Deployment Succeeded"
            else
              echo "## ❌ Production Deployment Failed"
            fi
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workflow | deploy-gcp |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Repository SHA | \`${{ github.sha }}\` |"
            echo "| Target branch | \`${{ env.TARGET_BRANCH }}\` |"
            echo "| Target VM path | \`${{ env.APP_DIR }}\` |"
            echo "| Compose file | \`docker-compose.microservices.prod.yml\` + \`docker-compose.observability.yml\` (LGTM via \`COMPOSE_PROFILES=observability\`) |"
            echo "| Deploy script | \`infra/scripts/deploy-production.sh\` |"
            echo "| Deploy log on VM | \`${{ env.APP_DIR }}/deploy.log\` |"
            echo "| Grafana (when enabled) | \`https://grafana.\$DOMAIN\` — see VM \`.env.production\` |"
            echo ""
            echo "> Timing breakdown (frontend_build / compose_up / health_gates) is emitted"
            echo "> to the VM deploy log: \`tail -20 ~/web/deploy.log\`"
          } >> "$GITHUB_STEP_SUMMARY"
