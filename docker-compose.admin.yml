# docker-compose.admin.yml
# Optional fallback: bind MinIO and Flower ports to localhost only (e.g. SSH tunnel) when not using Caddy subdomains.
# Preferred production path: Caddy proxies https://minio.DOMAIN and https://flower.DOMAIN (see Caddyfile + docker-compose.prod.yml).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.admin.yml up -d
services:
  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  flower:
    profiles: []
    ports:
      - "127.0.0.1:5555:5555"
