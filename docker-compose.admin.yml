# docker-compose.admin.yml
# Admin overlay: bind-mounts MinIO and Flower ports to localhost only for secure access on the production host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.admin.yml up -d
services:
  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  flower:
    profiles: []
    ports:
      - "127.0.0.1:5555:5555"
